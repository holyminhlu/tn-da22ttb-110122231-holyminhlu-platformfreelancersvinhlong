
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:transparent}
.scene{padding:2.5rem 1rem 3rem;display:flex;flex-direction:column;align-items:center;gap:2.5rem}
.row{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;align-items:flex-end}
.card{display:flex;flex-direction:column;align-items:center;gap:1rem;position:relative}
canvas.frame-canvas{border-radius:50%;position:absolute;pointer-events:none}
.avi{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;position:relative;z-index:3;user-select:none}
.label{text-align:center}
.lv{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-bottom:3px}
.nm{font-size:15px;font-weight:700}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:.06em;text-transform:uppercase}
.sep{width:1px;height:180px;background:linear-gradient(to bottom,transparent,#d1d5db,transparent);align-self:center}
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Bốn cấp bậc khung avatar cho FreelanceVN, từ Người mới đến Xuất sắc, với hiệu ứng canvas động.</h2>

<div class="scene">
  <div class="row" id="row-avatars"></div>
</div>

<script>
const TIERS = [
  { id:'t0', size:100, canvasSize:160, label:'Cấp 0', name:'Người mới', badgeText:'Newcomer', nm:'#9ca3af', bg:'#f3f4f6', fg:'#9ca3af', emoji:'👤',
    draw(ctx,t,W){
      const cx=W/2,cy=W/2,r=W/2-8;
      ctx.clearRect(0,0,W,W);
      ctx.save();
      ctx.strokeStyle='#d1d5db';
      ctx.lineWidth=2;
      ctx.setLineDash([6,5]);
      ctx.lineDashOffset=-t*0.4;
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineWidth=2.5;
      const pulseAlpha=0.4+0.3*Math.sin(t*0.04);
      ctx.strokeStyle=`rgba(156,163,175,${pulseAlpha})`;
      ctx.beginPath();ctx.arc(cx,cy,r-8,0,Math.PI*2);ctx.stroke();
      for(let i=0;i<6;i++){
        const a=i/6*Math.PI*2+t*0.015;
        const px=cx+Math.cos(a)*(r+2), py=cy+Math.sin(a)*(r+2);
        ctx.fillStyle=`rgba(156,163,175,${0.5+0.5*Math.sin(t*0.07+i)})`;
        ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
  },
  { id:'t1', size:100, canvasSize:170, label:'Cấp 1', name:'Tiêu chuẩn', badgeText:'Standard', nm:'#6366f1', bg:'#eef2ff', fg:'#4f46e5', emoji:'👨‍💻',
    draw(ctx,t,W){
      const cx=W/2,cy=W/2,r=W/2-6;
      ctx.clearRect(0,0,W,W);
      ctx.save();
      const grad=ctx.createConicalGradient?null:null;
      const steps=64;
      for(let i=0;i<steps;i++){
        const a0=(i/steps)*Math.PI*2+t*0.025;
        const a1=((i+1)/steps)*Math.PI*2+t*0.025;
        const hue=(i/steps)*280+200;
        ctx.strokeStyle=`hsl(${hue},80%,65%)`;
        ctx.lineWidth=4;
        ctx.beginPath();ctx.arc(cx,cy,r,a0,a1);ctx.stroke();
      }
      ctx.strokeStyle='rgba(255,255,255,0.9)';
      ctx.lineWidth=7;
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      for(let i=0;i<steps;i++){
        const a0=(i/steps)*Math.PI*2+t*0.025;
        const a1=((i+1)/steps)*Math.PI*2+t*0.025;
        const hue=(i/steps)*280+200;
        ctx.strokeStyle=`hsl(${hue},80%,65%)`;
        ctx.lineWidth=3.5;
        ctx.beginPath();ctx.arc(cx,cy,r,a0,a1);ctx.stroke();
      }
      for(let i=0;i<10;i++){
        const a=i/10*Math.PI*2-t*0.02;
        const px=cx+Math.cos(a)*(r+10), py=cy+Math.sin(a)*(r+10);
        const hue=200+(i/10)*280;
        const alpha=0.6+0.4*Math.sin(t*0.06+i*0.7);
        ctx.fillStyle=`hsla(${hue},80%,65%,${alpha})`;
        ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
  },
  { id:'t2', size:100, canvasSize:180, label:'Cấp 2', name:'Chuyên nghiệp', badgeText:'Professional', nm:'#b45309', bg:'#fef9ee', fg:'#92400e', emoji:'💼',
    draw(ctx,t,W){
      const cx=W/2,cy=W/2,r=W/2-6;
      ctx.clearRect(0,0,W,W);
      ctx.save();
      const glowR=r+8+4*Math.sin(t*0.04);
      const grd=ctx.createRadialGradient(cx,cy,r-4,cx,cy,glowR+8);
      grd.addColorStop(0,'rgba(251,191,36,0)');
      grd.addColorStop(0.5,`rgba(251,191,36,${0.3+0.2*Math.sin(t*0.05)})`);
      grd.addColorStop(1,'rgba(251,191,36,0)');
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.arc(cx,cy,glowR+8,0,Math.PI*2);ctx.fill();
      const steps=72;
      for(let i=0;i<steps;i++){
        const a0=(i/steps)*Math.PI*2+t*0.018;
        const a1=((i+1)/steps)*Math.PI*2+t*0.018;
        const p=(i/steps);
        const bright=p<0.5?p*2:2-p*2;
        ctx.strokeStyle=`hsl(${42+bright*16},95%,${48+bright*18}%)`;
        ctx.lineWidth=5;
        ctx.beginPath();ctx.arc(cx,cy,r,a0,a1);ctx.stroke();
      }
      ctx.strokeStyle='rgba(255,255,255,0.85)';
      ctx.lineWidth=8;
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      for(let i=0;i<steps;i++){
        const a0=(i/steps)*Math.PI*2+t*0.018;
        const a1=((i+1)/steps)*Math.PI*2+t*0.018;
        const p=(i/steps);
        const bright=p<0.5?p*2:2-p*2;
        ctx.strokeStyle=`hsl(${42+bright*16},95%,${48+bright*18}%)`;
        ctx.lineWidth=4.5;
        ctx.beginPath();ctx.arc(cx,cy,r,a0,a1);ctx.stroke();
      }
      const steps2=72;
      for(let i=0;i<steps2;i++){
        const a0=(i/steps2)*Math.PI*2-t*0.022;
        const a1=((i+1)/steps2)*Math.PI*2-t*0.022;
        const p=(i/steps2);
        const bright=p<0.5?p*2:2-p*2;
        ctx.strokeStyle=`hsla(${36+bright*20},90%,${55+bright*12}%,0.6)`;
        ctx.lineWidth=2.5;
        ctx.beginPath();ctx.arc(cx,cy,r-7,a0,a1);ctx.stroke();
      }
      for(let i=0;i<14;i++){
        const a=i/14*Math.PI*2+t*0.012;
        const twinkle=0.4+0.6*Math.abs(Math.sin(t*0.08+i*1.3));
        const dist=r+14;
        const px=cx+Math.cos(a)*dist, py=cy+Math.sin(a)*dist;
        ctx.fillStyle=`rgba(251,191,36,${twinkle})`;
        const s=2.5+twinkle*1.5;
        ctx.save();ctx.translate(px,py);ctx.rotate(a+t*0.03);
        ctx.fillRect(-s/2,-s/6,s,s/3);
        ctx.fillRect(-s/6,-s/2,s/3,s);
        ctx.restore();
      }
      ctx.restore();
    }
  },
  { id:'ttop', size:108, canvasSize:200, label:'Top Rated', name:'Xuất sắc', badgeText:'✦ Elite', nm:null, bg:'#fdf4ff', fg:'#7c3aed', emoji:'🏆',
    draw(ctx,t,W){
      const cx=W/2,cy=W/2,r=W/2-8;
      ctx.clearRect(0,0,W,W);
      ctx.save();
      const hue0=(t*0.5)%360;
      const glowAlpha=0.35+0.2*Math.sin(t*0.04);
      const grd=ctx.createRadialGradient(cx,cy,r-6,cx,cy,r+20);
      grd.addColorStop(0,`hsla(${hue0},80%,60%,0)`);
      grd.addColorStop(0.5,`hsla(${hue0},80%,60%,${glowAlpha})`);
      grd.addColorStop(1,`hsla(${hue0},80%,60%,0)`);
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.arc(cx,cy,r+20,0,Math.PI*2);ctx.fill();
      const steps=96;
      for(let i=0;i<steps;i++){
        const a0=(i/steps)*Math.PI*2+t*0.03;
        const a1=((i+1)/steps)*Math.PI*2+t*0.03;
        const hue=(hue0+i/steps*360)%360;
        ctx.strokeStyle=`hsl(${hue},90%,62%)`;
        ctx.lineWidth=6;
        ctx.beginPath();ctx.arc(cx,cy,r,a0,a1);ctx.stroke();
      }
      ctx.strokeStyle='rgba(255,255,255,0.92)';
      ctx.lineWidth=9;
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      for(let i=0;i<steps;i++){
        const a0=(i/steps)*Math.PI*2+t*0.03;
        const a1=((i+1)/steps)*Math.PI*2+t*0.03;
        const hue=(hue0+i/steps*360)%360;
        ctx.strokeStyle=`hsl(${hue},90%,62%)`;
        ctx.lineWidth=5.5;
        ctx.beginPath();ctx.arc(cx,cy,r,a0,a1);ctx.stroke();
      }
      for(let i=0;i<steps;i++){
        const a0=(i/steps)*Math.PI*2-t*0.02;
        const a1=((i+1)/steps)*Math.PI*2-t*0.02;
        const hue=(hue0+180+i/steps*360)%360;
        ctx.strokeStyle=`hsla(${hue},85%,65%,0.55)`;
        ctx.lineWidth=2.5;
        ctx.beginPath();ctx.arc(cx,cy,r-8,a0,a1);ctx.stroke();
      }
      for(let i=0;i<20;i++){
        const baseA=i/20*Math.PI*2;
        const a=baseA+t*0.018;
        const twinkle=Math.abs(Math.sin(t*0.09+i*0.95));
        const hue=(hue0+i/20*360)%360;
        const dist=r+16+4*Math.sin(t*0.05+i);
        const px=cx+Math.cos(a)*dist, py=cy+Math.sin(a)*dist;
        if(i%3===0){
          ctx.fillStyle=`hsla(${hue},90%,65%,${0.5+0.5*twinkle})`;
          ctx.save();ctx.translate(px,py);ctx.rotate(a+t*0.04);
          const s=3+twinkle*2.5;
          ctx.fillRect(-s/2,-s/6,s,s/3);
          ctx.fillRect(-s/6,-s/2,s/3,s);
          ctx.restore();
        } else {
          ctx.fillStyle=`hsla(${hue},85%,68%,${0.4+0.6*twinkle})`;
          ctx.beginPath();ctx.arc(px,py,1.5+twinkle*1.5,0,Math.PI*2);ctx.fill();
        }
      }
      const nParticles=12;
      for(let i=0;i<nParticles;i++){
        const life=(t*0.6+i*(1000/nParticles))%1000/1000;
        const a=i/nParticles*Math.PI*2+t*0.01;
        const dist=r+2+life*24;
        const px=cx+Math.cos(a)*dist, py=cy+Math.sin(a)*dist;
        const alpha=(1-life)*0.8;
        const hue=(hue0+i/nParticles*360)%360;
        ctx.fillStyle=`hsla(${hue},90%,65%,${alpha})`;
        ctx.beginPath();ctx.arc(px,py,2.5*(1-life*0.5),0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
  }
];

function buildRow(){
  const row=document.getElementById('row-avatars');
  TIERS.forEach((tier,idx)=>{
    const W=tier.canvasSize;
    const card=document.createElement('div');
    card.className='card';
    card.style.width=W+'px';
    const wrap=document.createElement('div');
    wrap.style.cssText=`position:relative;width:${W}px;height:${W}px;display:flex;align-items:center;justify-content:center`;
    const cvs=document.createElement('canvas');
    cvs.width=W;cvs.height=W;
    cvs.className='frame-canvas';
    cvs.style.cssText=`width:${W}px;height:${W}px;position:absolute;top:0;left:0;border-radius:50%`;
    const avi=document.createElement('div');
    avi.className='avi';
    avi.style.cssText=`width:${tier.size}px;height:${tier.size}px;background:${tier.bg};font-size:2.2rem`;
    avi.textContent=tier.emoji;
    wrap.append(cvs,avi);
    const lbl=document.createElement('div');
    lbl.className='label';
    const lv=document.createElement('div');lv.className='lv';lv.textContent=tier.label;
    const nm=document.createElement('div');nm.className='nm';
    if(tier.nm){nm.style.color=tier.nm;nm.textContent=tier.name;}
    else{
      nm.style.cssText='background:linear-gradient(90deg,#e879f9,#f43f5e,#facc15,#34d399,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% 100%;animation:gradShift 3s linear infinite';
      nm.textContent=tier.name;
    }
    lbl.append(lv,nm);
    const badge=document.createElement('span');
    badge.className='badge';
    if(idx===0){badge.style.cssText='background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db';}
    else if(idx===1){badge.style.cssText='background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe';}
    else if(idx===2){badge.style.cssText='background:#fffbeb;color:#92400e;border:1px solid #fcd34d';}
    else{badge.style.cssText='background:linear-gradient(90deg,#fdf4ff,#fff1f2);color:#7c3aed;border:1px solid #e879f9';}
    badge.textContent=tier.badgeText;
    card.append(wrap,lbl,badge);
    tier._canvas=cvs;
    tier._ctx=cvs.getContext('2d');
    row.appendChild(card);
    if(idx<TIERS.length-1){
      const sep=document.createElement('div');sep.className='sep';row.appendChild(sep);
    }
  });
}

const style=document.createElement('style');
style.textContent='@keyframes gradShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}';
document.head.appendChild(style);

buildRow();

let t=0;
function loop(){
  t++;
  TIERS.forEach(tier=>{
    if(tier._ctx) tier.draw(tier._ctx,t,tier.canvasSize);
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
