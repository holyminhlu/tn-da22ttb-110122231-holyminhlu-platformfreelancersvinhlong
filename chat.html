<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zalo Clone - My Documents</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
        }
        .sidebar-item-active {
            background-color: #e5efff;
        }
        .chat-bubble-received {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .chat-bubble-sent {
            background-color: #e5efff;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
        const { useState } = React;

        const SidebarItem = ({ name, message, time, active, avatar, isGroup, badge }) => (
            <div className={`flex items-center p-3 cursor-pointer hover:bg-gray-100 transition-colors ${active ? 'sidebar-item-active' : ''}`}>
                <div className="relative">
                    <img src={avatar || `https://ui-avatars.com/api/?name=${name}&background=random`} className="w-12 h-12 rounded-full object-cover" alt={name} />
                    {badge && <span className="absolute -top-1 -right-1 bg-gray-400 text-white text-[10px] px-1 rounded-full border-2 border-white">{badge}</span>}
                </div>
                <div className="ml-3 flex-1 overflow-hidden">
                    <div className="flex justify-between items-center">
                        <h4 className={`text-sm font-medium truncate ${active ? 'text-blue-600' : 'text-gray-900'}`}>
                            {isGroup && <i className="fas fa-users mr-1 text-gray-500"></i>}
                            {name}
                        </h4>
                        <span className="text-xs text-gray-400 whitespace-nowrap ml-2">{time}</span>
                    </div>
                    <p className="text-xs text-gray-500 truncate mt-0.5">{message}</p>
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('Ưu tiên');

            return (
                <div className="flex h-screen bg-white overflow-hidden">
                    {/* Left Panel */}
                    <div className="w-[340px] flex flex-col border-r border-gray-200 h-full">
                        {/* Search & Actions */}
                        <div className="p-4 flex items-center space-x-3">
                            <div className="relative flex-1">
                                <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input 
                                    type="text" 
                                    placeholder="Tìm kiếm" 
                                    className="w-full bg-gray-100 rounded-md py-1.5 pl-9 pr-3 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400"
                                />
                            </div>
                            <i className="fas fa-user-plus text-gray-500 cursor-pointer text-lg"></i>
                            <i className="fas fa-users text-gray-500 cursor-pointer text-lg"></i>
                        </div>

                        {/* Tabs */}
                        <div className="flex px-4 border-b border-gray-100 text-sm font-medium">
                            <div 
                                className={`pb-2 mr-6 cursor-pointer ${activeTab === 'Ưu tiên' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}
                                onClick={() => setActiveTab('Ưu tiên')}
                            >
                                Ưu tiên
                            </div>
                            <div 
                                className={`pb-2 cursor-pointer ${activeTab === 'Khác' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}
                                onClick={() => setActiveTab('Khác')}
                            >
                                Khác
                            </div>
                            <div className="ml-auto text-gray-400 flex items-center space-x-2 pb-2">
                                <span className="text-xs">Phân loại</span>
                                <i className="fas fa-chevron-down text-[10px]"></i>
                                <i className="fas fa-ellipsis-h ml-1"></i>
                            </div>
                        </div>

                        {/* Chat List */}
                        <div className="flex-1 overflow-y-auto scrollbar-hide">
                            <SidebarItem name="Tất 12 Xu" message="Trưa mè cốt" time="4 giờ" />
                            <SidebarItem name="Phạm Minh Nhật" message="tải giùm máy tôi ngồi đi, ổ D, thư ..." time="6 giờ" />
                            <SidebarItem name="Huệ Trinh" message="Bạn: vô ko" time="18 giờ" />
                            <SidebarItem name="ĐỘI “THANH NIÊN XUN..." message="Cẩm Nhanh: Sáng 7/6 nha mấy bạn ơi..." time="2 ngày" isGroup={true} />
                            <SidebarItem name="Triều Deadline" message="Sticker" time="2 ngày" />
                            <SidebarItem name="Moi Future" message="Bạn: Hú" time="2 ngày" />
                            <SidebarItem name="Nhí nhỏ" message="Nhí nhỏ hiện không muốn nhận tin ..." time="2 ngày" />
                            <SidebarItem name="CLB Khởi Nghiệp | T..." message="Sơn Trần Minh Mẫn: Hình ảnh" time="3 ngày" isGroup={true} badge="5+" />
                            <SidebarItem name="CLB Khởi Nghiệp | T..." message="Sơn Trần Minh Mẫn: Hình ảnh" time="3 ngày" isGroup={true} badge="5+" />
                        </div>
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-1 flex flex-col bg-[#f4f5f7]">
                        {/* Header */}
                        <div className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 shrink-0">
                            <div className="flex items-center">
                                <div className="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white mr-3">
                                    <i className="fas fa-cloud text-xl"></i>
                                </div>
                                <div>
                                    <h3 className="font-semibold text-gray-800">My Documents</h3>
                                    <p className="text-xs text-gray-500 flex items-center">
                                        Lưu và đồng bộ dữ liệu giữa các thiết bị <i className="fas fa-folder-open ml-2 text-gray-400"></i>
                                    </p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-5 text-gray-500">
                                <i className="fas fa-search cursor-pointer text-lg"></i>
                                <i className="far fa-window-maximize cursor-pointer text-lg"></i>
                            </div>
                        </div>

                        {/* Messages Area */}
                        <div className="flex-1 overflow-y-auto p-6 space-y-8 flex flex-col">
                            {/* Date Separator */}
                            <div className="flex justify-center">
                                <span className="bg-gray-300 bg-opacity-50 text-white text-[10px] px-3 py-1 rounded-full uppercase tracking-wider">T2 01/06/2026</span>
                            </div>

                            {/* Image Message */}
                            <div className="flex justify-end">
                                <div className="relative group max-w-[280px]">
                                    <div className="bg-white p-1 rounded shadow-sm border border-gray-200">
                                        <img 
                                            src="https://placehold.co/240x320/white/000?text=Bank+Transaction+Receipt\n2398961214\nNGUYEN+VAN+A\n130,000+VND" 
                                            alt="Receipt" 
                                            className="w-full h-auto rounded-sm"
                                        />
                                        <div className="absolute bottom-2 left-2 bg-black bg-opacity-30 rounded p-1">
                                            <i className="fas fa-cloud text-white text-[10px]"></i>
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-end mt-1 space-x-1">
                                        <span className="text-[10px] text-gray-400 bg-black bg-opacity-20 px-1 rounded">20:04</span>
                                        <div className="bg-white rounded-full p-0.5 border border-gray-200">
                                            <i className="far fa-thumbs-up text-blue-500 text-[10px]"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Date Separator Today */}
                            <div className="flex justify-center">
                                <span className="bg-gray-300 bg-opacity-50 text-white text-[10px] px-4 py-1 rounded-full">Hôm qua</span>
                            </div>

                            {/* File Message */}
                            <div className="flex justify-end">
                                <div className="max-w-[320px] w-full">
                                    <div className="bg-white p-3 rounded-lg shadow-sm border border-gray-200 flex items-center space-x-3">
                                        <div className="bg-red-500 text-white p-2.5 rounded-md flex flex-col items-center justify-center">
                                            <span className="text-[10px] font-bold">PDF</span>
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm font-medium text-gray-800 truncate">HocBa_062919.pdf</p>
                                            <p className="text-[11px] text-gray-500 mt-0.5">3.04 MB <i className="fas fa-cloud-upload-alt ml-1"></i> Đã có trên Cloud</p>
                                        </div>
                                        <div className="flex space-x-3 text-gray-400">
                                            <i className="far fa-folder cursor-pointer"></i>
                                            <i className="fas fa-download cursor-pointer"></i>
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between mt-1 px-1">
                                        <span className="text-[10px] text-gray-400">18:31</span>
                                        <div className="bg-white rounded-full p-0.5 border border-gray-200">
                                            <i className="far fa-thumbs-up text-blue-500 text-[10px]"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Text Message */}
                            <div className="flex justify-center w-full px-4">
                                <div className="max-w-[700px] w-full bg-[#e5efff] p-4 rounded-lg relative">
                                    <p className="text-sm text-gray-800 leading-relaxed">
                                        "Write HTML/CSS/JS code that creates an animation where countless tiny letters swirl in a chaotic storm, then gradually align to form the word (name of AI) in the center. After holding for a moment, the word dissolves back into a swirling storm of letters in a seamless loop."
                                    </p>
                                    <div className="flex items-center justify-between mt-2">
                                        <span className="text-[10px] text-gray-400">20:14</span>
                                        <div className="flex items-center space-x-1 bg-gray-300 bg-opacity-40 rounded-full px-2 py-0.5">
                                            <i className="fas fa-check text-[8px] text-white"></i>
                                            <span className="text-[10px] text-white">Đã gửi</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Input Area */}
                        <div className="bg-white border-t border-gray-200">
                            {/* Toolbar */}
                            <div className="px-4 py-2 flex items-center space-x-6 text-gray-500 border-b border-gray-50">
                                <i className="far fa-smile cursor-pointer hover:text-blue-500"></i>
                                <i className="far fa-image cursor-pointer hover:text-blue-500"></i>
                                <i className="fas fa-paperclip cursor-pointer hover:text-blue-500"></i>
                                <i className="far fa-id-card cursor-pointer hover:text-blue-500"></i>
                                <div className="flex items-center space-x-1 cursor-pointer group">
                                    <div className="border border-gray-400 rounded w-4 h-4 flex items-center justify-center text-[8px] group-hover:border-blue-500 group-hover:text-blue-500">Z</div>
                                    <i className="fas fa-caret-down text-[8px]"></i>
                                </div>
                                <i className="fas fa-font cursor-pointer hover:text-blue-500"></i>
                                <i className="far fa-comment-dots cursor-pointer hover:text-blue-500"></i>
                                <i className="far fa-keyboard cursor-pointer hover:text-blue-500"></i>
                                <i className="fas fa-ellipsis-h cursor-pointer hover:text-blue-500"></i>
                            </div>
                            {/* Text Input */}
                            <div className="p-3 flex items-center">
                                <input 
                                    type="text" 
                                    placeholder="Nhập @, tin nhắn tới My Documents" 
                                    className="flex-1 outline-none text-sm px-1 py-2"
                                />
                                <div className="flex items-center space-x-4 px-2">
                                    <i className="far fa-smile text-xl text-gray-400 cursor-pointer"></i>
                                    <i className="far fa-thumbs-up text-xl text-yellow-500 cursor-pointer"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
