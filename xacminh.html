<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Xác minh danh tính</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
        const { useState } = React;

        const App = () => {
            const steps = [
                { id: 1, title: 'Thông tin nhận dạng', active: true },
                { id: 2, title: 'Xác minh thẻ tín dụng', active: false },
                { id: 3, title: 'Gửi để xem xét', active: false },
            ];

            const cards = [
                {
                    icon: 'fas fa-check text-black',
                    title: 'Thêm số điện thoại',
                    description: 'Xác minh số điện thoại của bạn',
                    completed: true,
                    selected: false
                },
                {
                    icon: 'far fa-envelope text-blue-600 text-2xl',
                    title: 'Thông tin liên hệ',
                    description: 'Tên hợp pháp và địa chỉ thường trú',
                    completed: false,
                    selected: true
                },
                {
                    icon: 'fas fa-camera text-gray-300 text-2xl',
                    title: 'Ảnh hiện tại',
                    description: 'Ảnh được chụp bằng webcam hoặc camera của điện thoại thông minh.',
                    completed: false,
                    selected: false
                },
                {
                    icon: 'far fa-id-card text-gray-300 text-2xl',
                    title: 'Giấy tờ tùy thân do chính phủ cấp',
                    description: 'Mặt trước và mặt sau của giấy tờ tùy thân có ảnh, hiển thị cả 4 cạnh.',
                    completed: false,
                    selected: false
                },
                {
                    icon: 'fas fa-map-marker-alt text-gray-300 text-2xl',
                    title: 'Bằng chứng địa chỉ',
                    description: 'Giấy tờ chứng minh địa chỉ có ngày cấp trong vòng 60 ngày và xác nhận tên và địa chỉ của bạn trên tài khoản.',
                    completed: false,
                    selected: false
                }
            ];

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    {/* Stepper */}
                    <div className="flex flex-col md:flex-row gap-4 mb-8">
                        {steps.map((step) => (
                            <div 
                                key={step.id} 
                                className={`flex-1 flex items-center p-4 rounded-lg border h-20 ${step.active ? 'bg-white border-blue-500 shadow-sm' : 'bg-gray-100 border-transparent text-gray-400'}`}
                            >
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center mr-4 text-sm font-semibold ${step.active ? 'bg-blue-600 text-white' : 'bg-gray-300 text-white'}`}>
                                    {step.id}
                                </div>
                                <span className={`text-sm font-medium ${step.active ? 'text-gray-700' : 'text-gray-400'}`}>
                                    {step.title}
                                </span>
                            </div>
                        ))}
                    </div>

                    {/* Main Content Card */}
                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-8">
                        <div className="flex justify-between items-start mb-2">
                            <h1 className="text-2xl font-semibold text-gray-800">Thông tin nhận dạng</h1>
                            <div className="flex items-center text-sm text-gray-600">
                                <div className="relative w-5 h-5 mr-2">
                                    <svg viewBox="0 0 32 32" className="transform -rotate-90">
                                        <circle cx="16" cy="16" r="14" fill="transparent" stroke="#e2e8f0" strokeWidth="4" />
                                        <circle cx="16" cy="16" r="14" fill="transparent" stroke="#3b82f6" strokeWidth="4" strokeDasharray="88" strokeDashoffset="70.4" />
                                    </svg>
                                </div>
                                <span>Đã hoàn thành 1/5</span>
                            </div>
                        </div>
                        <p className="text-gray-600 mb-8">Vui lòng cung cấp các thông tin sau:</p>

                        {/* Verification Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-12">
                            {cards.map((card, index) => (
                                <div 
                                    key={index}
                                    className={`relative p-6 rounded-lg border h-full flex flex-col ${card.selected ? 'border-blue-500 ring-1 ring-blue-500' : 'border-gray-200'} transition-all`}
                                >
                                    <div className="mb-4">
                                        <i className={card.icon}></i>
                                    </div>
                                    <h3 className={`text-sm font-semibold mb-2 ${card.selected ? 'text-gray-900' : 'text-gray-700'}`}>
                                        {card.title}
                                    </h3>
                                    <p className="text-xs text-gray-500 leading-relaxed">
                                        {card.description}
                                    </p>
                                </div>
                            ))}
                        </div>

                        {/* Footer Controls */}
                        <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                            <button className="bg-blue-600 hover:bg-blue-700 text-white font-medium px-8 py-2.5 rounded-md transition-colors w-full md:w-auto">
                                Bắt đầu xác minh
                            </button>
                            <p className="text-sm text-gray-600">
                                Quá trình xác minh dễ dàng hơn trên thiết bị di động. <a href="#" className="text-blue-600 hover:underline">Hãy gửi đường dẫn đến email của chính bạn.</a>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
